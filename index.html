<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Play Store Privacy Policies</title>
    <meta
      name="description"
      content="Public privacy policy links for apps published by Derryltaufik."
    />
    <style>
      :root {
        color-scheme: light;
        --background: #f6f2e8;
        --surface: #fffaf0;
        --ink: #18211f;
        --muted: #5e6a65;
        --line: #d9d0bf;
        --accent: #0f766e;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(180deg, rgba(15, 118, 110, 0.1), transparent 340px),
          var(--background);
        color: var(--ink);
        font-size: 16px;
        line-height: 1.6;
      }

      main {
        width: min(100% - 40px, 860px);
        margin: 0 auto;
        padding: 72px 0;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.2rem, 8vw, 4.6rem);
        line-height: 1.1;
        letter-spacing: 0;
      }

      p {
        max-width: 680px;
        margin: 20px 0 0;
        color: var(--muted);
        font-size: 1.12rem;
      }

      ul {
        display: grid;
        gap: 14px;
        margin: 34px 0 0;
        padding: 0;
        list-style: none;
      }

      a {
        display: block;
        padding: 20px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        color: var(--ink);
        font-size: 1.2rem;
        font-weight: 800;
        text-decoration: none;
      }

      a:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      @media (max-width: 720px) {
        main {
          width: min(100% - 28px, 860px);
          padding: 46px 0;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Play Store Privacy Policies</h1>
      <p>
        Public privacy policy pages for apps published by Derryltaufik. Choose
        an app below.
      </p>
      <ul>
        <li><a href="./nutritools/">NutriTools Privacy Policy</a></li>
      </ul>
    </main>
  </body>
</html>
